<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grocery Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">Login to Pantry</h2>
            <p id="auth-error" class="text-red-500 text-sm mb-4 hidden bg-red-50 p-2 rounded"></p>

            <form id="auth-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" id="auth-btn" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 transition">
          Login
        </button>
            </form>

            <p class="mt-4 text-center text-sm">
                <button type="button" id="toggle-auth" class="text-blue-500 hover:text-blue-700 underline transition">
          Don't have an account? Register here
        </button>
            </p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden p-8 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Inventory Dashboard</h1>
            <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 font-bold transition">Logout</button>
        </div>

        <div id="alerts-container" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm">
            <p class="font-bold">Low Stock Alert!</p>
            <p id="alerts-text"></p>
        </div>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <h3 class="font-bold mb-4">Add New Grocery Item</h3>
            <form id="add-item-form" class="flex gap-4 items-end flex-wrap">
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-bold mb-1">Name</label>
                    <input type="text" id="item-name" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="e.g., Milk" required>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-bold mb-1">Category</label>
                    <input type="text" id="item-category" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="e.g., Dairy" required>
                </div>
                <div class="w-24">
                    <label class="block text-sm font-bold mb-1">Qty</label>
                    <input type="number" id="item-qty" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-500" value="1" min="0" required>
                </div>
                <div class="w-24">
                    <label class="block text-sm font-bold mb-1">Min Qty</label>
                    <input type="number" id="item-min" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-500" value="1" min="1" required>
                </div>
                <div class="w-24">
                    <label class="block text-sm font-bold mb-1">Unit</label>
                    <input type="text" id="item-unit" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Liters" required>
                </div>
                <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 font-bold h-10 transition">Add Item</button>
            </form>
        </div>

        <div class="bg-white shadow rounded-lg overflow-hidden overflow-x-auto">
            <table class="w-full text-left whitespace-nowrap">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Item Name</th>
                        <th class="p-4">Category</th>
                        <th class="p-4">Quantity</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
